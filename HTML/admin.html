<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../CSS/style.css">
    <title>Admin - Add Gallery Item</title>
</head>
<body class="bg-black text-[#edeced] font-sans">

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-20 flex w-64 flex-col bg-gray-900/80 backdrop-blur-lg transform -translate-x-full transition-transform duration-300 ease-in-out">
        <a href="../index.html" class="block p-6 hover:opacity-80 transition-opacity duration-200">
            <div>
                <h2 class="text-2xl font-bold uppercase">Atoptics</h2>
                <p class="text-sm text-gray-400">by Brydon Leverentz</p>
            </div>
        </a>
        <div class="flex-1 overflow-y-auto pb-6">
            <nav class="mt-8">
                <a href="../index.html" class="inline-flex items-center px-6 py-3 text-gray-300 hover:bg-gray-700 hover:text-white transition-colors duration-200 rounded-md"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg><span>Home</span></a>
                <a href="gallery.html" class="inline-flex items-center px-6 py-3 text-gray-300 hover:bg-gray-700 hover:text-white transition-colors duration-200 rounded-md"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg><span>Gallery</span></a>
                <a href="about.html" class="inline-flex items-center px-6 py-3 text-gray-300 hover:bg-gray-700 hover:text-white transition-colors duration-200 rounded-md"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg><span>About</span></a>
                <a href="contact.html" class="inline-flex items-center px-6 py-3 text-gray-300 hover:bg-gray-700 hover:text-white transition-colors duration-200 rounded-md"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg><span>Contact</span></a>
            </nav>
        </div>
    </aside>

    <button id="sidebar-toggle" class="fixed top-6 left-0 z-30 p-2 text-white bg-gray-900/80 rounded-r-md focus:outline-none transition-transform duration-300 ease-in-out">
        <svg id="arrow-icon" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
    </button>
    
    <main id="main-content" class="overflow-y-auto h-screen transition-all duration-300 ease-in-out">
        <section class="p-8 md:p-16">
            <h1 class="text-5xl font-bold uppercase">Add New Gallery Item</h1>
            
            <form id="gallery-form" class="mt-8 space-y-6 max-w-4xl">
                <div>
                    <label for="folder-name" class="block text-sm font-medium text-gray-300">Folder Name (e.g., "new-york-city")</label>
                    <input type="text" id="folder-name" required class="mt-1 block w-full bg-gray-800 border-gray-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div>
                    <label for="image-upload" class="block text-sm font-medium text-gray-300">Image File</label>
                    <input type="file" id="image-upload" accept="image/jpeg, image/png, image/webp" required class="mt-1 block w-full text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-gray-700 file:text-gray-300 hover:file:bg-gray-600">
                </div>

                <div id="markdown-sections" class="space-y-4">
                    <!-- Dynamic sections will be added here -->
                </div>

                <button type="button" id="add-section-btn" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-gray-600 hover:bg-gray-700 focus:outline-none">
                    Add Description Section
                </button>

                <hr class="border-gray-700">

                <button type="submit" class="w-full inline-flex justify-center py-3 px-4 border border-transparent shadow-sm text-base font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none">
                    Submit to GitHub
                </button>
            </form>
        </section>
    </main>

    <script src="../JS/sidebar.js" defer></script>
    <script>
        const form = document.getElementById('gallery-form');
        const addSectionBtn = document.getElementById('add-section-btn');
        const markdownSectionsContainer = document.getElementById('markdown-sections');
        let sectionCount = 0;

        function addSection() {
            sectionCount++;
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'border border-gray-700 p-4 rounded-md';
            sectionDiv.innerHTML = `
                <label for="section-header-${sectionCount}" class="block text-sm font-medium text-gray-400">Section Header (Optional)</label>
                <input type="text" id="section-header-${sectionCount}" class="mt-1 block w-full bg-gray-800 border-gray-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                <label for="section-content-${sectionCount}" class="mt-4 block text-sm font-medium text-gray-300">Section Content</label>
                <textarea id="section-content-${sectionCount}" rows="5" required class="mt-1 block w-full bg-gray-800 border-gray-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"></textarea>
            `;
            markdownSectionsContainer.appendChild(sectionDiv);
        }

        addSectionBtn.addEventListener('click', addSection);

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const folderName = document.getElementById('folder-name').value;
            const image = document.getElementById('image-upload').files[0];
            
            let markdownContent = '';
            for (let i = 1; i <= sectionCount; i++) {
                const header = document.getElementById(`section-header-${i}`).value;
                const content = document.getElementById(`section-content-${i}`).value;
                if (header) {
                    markdownContent += `## ${header}\n\n`;
                }
                markdownContent += `${content}\n\n`;
            }

            // --- BACKEND SUBMISSION LOGIC ---
            const formData = new FormData();
            formData.append('folderName', folderName);
            formData.append('image', image);
            formData.append('markdownContent', markdownContent);

            fetch('/api/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                console.log('Success:', data);
                alert('Gallery item submitted successfully! The GitHub Action will now rebuild the gallery.');
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred during submission.');
            });
        });

        // Add the first section by default
        addSection();
    </script>
</body>
</html>
