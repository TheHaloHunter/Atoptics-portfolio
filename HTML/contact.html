<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../CSS/style.css">
    <title>Contact - Atoptics</title>
</head>
<body class="bg-black text-[#edeced] font-sans">

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-20 flex w-64 flex-col bg-gray-900/80 backdrop-blur-lg transform -translate-x-full transition-transform duration-300 ease-in-out">
        <a href="../index.html" class="block p-6 hover:opacity-80 transition-opacity duration-200">
            <div>
                <h2 class="text-2xl font-bold uppercase">Atoptics</h2>
                <p class="text-sm text-gray-400">by Brydon Leverentz</p>
            </div>
        </a>
        <div class="flex-1 overflow-y-auto pb-6">
            <nav class="mt-8">
                <a href="../index.html" class="inline-flex items-center px-6 py-3 text-gray-300 hover:bg-gray-700 hover:text-white transition-colors duration-200 rounded-md"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg><span>Home</span></a>
                <a href="gallery.html" class="inline-flex items-center px-6 py-3 text-gray-300 hover:bg-gray-700 hover:text-white transition-colors duration-200 rounded-md"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg><span>Gallery</span></a>
                <a href="about.html" class="inline-flex items-center px-6 py-3 text-gray-300 hover:bg-gray-700 hover:text-white transition-colors duration-200 rounded-md"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg><span>About</span></a>
                <a href="contact.html" class="inline-flex items-center px-6 py-3 text-gray-300 hover:bg-gray-700 hover:text-white transition-colors duration-200 rounded-md"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg><span>Contact</span></a>
            </nav>
        </div>
    </aside>

    <button id="sidebar-toggle" class="fixed top-6 left-0 z-30 p-2 text-white bg-gray-900/80 rounded-r-md focus:outline-none transition-transform duration-300 ease-in-out">
        <svg id="arrow-icon" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
    </button>
    
    <main id="main-content" class="overflow-y-auto h-screen transition-all duration-300 ease-in-out">
        <section class="p-8 md:p-16">
            <h1 class="text-5xl font-bold uppercase">Contact</h1>
            <p class="mt-4 text-lg text-gray-300">Have a question or want to work together? Drop a message below.</p>

            <form id="contact-form" class="mt-8 space-y-6 max-w-4xl mx-auto">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-300">Your Name</label>
                    <input type="text" name="name" id="name" required class="mt-1 block w-full bg-gray-800 border-gray-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-300">Your Email</label>
                    <input type="email" name="email" id="email" required class="mt-1 block w-full bg-gray-800 border-gray-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label for="message" class="block text-sm font-medium text-gray-300">Message</label>
                    <textarea id="message" name="message" rows="5" required class="mt-1 block w-full bg-gray-800 border-gray-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                </div>
                <div class="flex items-center gap-4">
                    <button type="submit" id="submit-btn" class="w-full md:w-auto inline-flex justify-center py-3 px-8 border border-transparent shadow-sm text-base font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none">
                        Send Message
                    </button>
                    <p id="status-message" class="text-gray-300"></p>
                </div>
            </form>
        </section>
    </main>

    <script src="../JS/sidebar.js" defer></script>
    <!-- Replace YOUR_RECAPTCHA_SITE_KEY with your actual site key, or load it dynamically -->
    <!-- For this project, we will add it directly. You can get this from your .env file. -->
    <script src="https://www.google.com/recaptcha/api.js?render=Your_Public_reCAPTCHA_Site_Key" async defer></script>
    <script>
        const form = document.getElementById('contact-form');
        const submitBtn = document.getElementById('submit-btn');
        const statusMessage = document.getElementById('status-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            statusMessage.textContent = '';

            // The reCAPTCHA Site Key you get from Google
            const recaptchaSiteKey = 'Your_Public_reCAPTCHA_Site_Key';

            grecaptcha.ready(function() {
                grecaptcha.execute(recaptchaSiteKey, {action: 'submit'}).then(async function(token) {
                    const formData = {
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        message: document.getElementById('message').value,
                        token: token, // Add the token to the form data
                    };

                    try {
                        const response = await fetch('/api/send-email', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(formData),
                        });

                        const result = await response.json();

                        if (response.ok) {
                            statusMessage.textContent = 'Message sent successfully!';
                            statusMessage.className = 'text-green-400';
                            form.reset();
                        } else {
                            throw new Error(result.message || 'An unknown error occurred.');
                        }
                    } catch (error) {
                        statusMessage.textContent = `Error: ${error.message}`;
                        statusMessage.className = 'text-red-400';
                    } finally {
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Send Message';
                    }
                });
            });
        });
    </script>
</body>
</html>
